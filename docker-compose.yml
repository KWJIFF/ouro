version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${PORT:-3001}
      - NEXT_PUBLIC_WS_URL=ws://localhost:${PORT:-3001}

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    env_file: .env
    volumes:
      - ./packages/server/src:/app/packages/server/src
      - ./packages/core/src:/app/packages/core/src

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ouro
      POSTGRES_USER: ouro
      POSTGRES_PASSWORD: ouro_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/server/src/db/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ouro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
