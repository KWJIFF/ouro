openapi: 3.0.3
info:
  title: Ouro API
  version: 0.3.0
  description: |
    The Self-Evolving Signal System API.
    
    Ouro is a 7-layer signal processing pipeline that captures human creative signals,
    understands intent, executes optimal tool chains, builds artifacts, recovers patterns,
    and evolves autonomously.
    
    ## Authentication
    Optional. If OURO_API_KEY is set, include it as X-Api-Key header.
    
    ## Core Concepts
    - **Signal**: Any input from a human (text, voice, image, video, file)
    - **Intent**: What the human wants (create, modify, explore, capture, connect, compose)
    - **Execution Plan**: A DAG of tool invocations
    - **Artifact**: A produced output (code, document, image, etc.)
    - **Pattern**: A recovered behavioral signal (creativity trigger, domain preference, etc.)
    - **Evolution**: A system self-improvement event

servers:
  - url: http://localhost:3001
    description: Local development

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:
    Signal:
      type: object
      properties:
        id:
          type: string
          example: "01KNA7Y4T0JJHK4CADRECV507T"
        modality:
          type: string
          enum: [text, voice, image, video, sketch, file, composite]
        normalized_text:
          type: string
        status:
          type: string
          enum: [captured, parsed, executing, completed, failed]
        created_at:
          type: string
          format: date-time

    Intent:
      type: object
      properties:
        type:
          type: string
          enum: [create, modify, explore, capture, connect, compose]
        description:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1

    ExecutionStep:
      type: object
      properties:
        id:
          type: string
        tool:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]

    Artifact:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        content:
          type: string
        version:
          type: integer

    Feedback:
      type: object
      required: [artifact_id, signal_id, action]
      properties:
        artifact_id:
          type: string
        signal_id:
          type: string
        action:
          type: string
          enum: [accept, modify, reject, fork, share, revisit]
        modification:
          type: object
        satisfaction_score:
          type: number

    EvolutionStats:
      type: object
      properties:
        phase:
          type: string
          enum: [symbiosis, dominance, autonomy]
        evolution_cycle_count:
          type: integer
        total_patterns:
          type: integer

    ToolManifest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string

    SignalSubmission:
      type: object
      properties:
        text:
          type: string
          description: Signal text content
        urls:
          type: array
          items:
            type: string
        context:
          type: object
          properties:
            session_id:
              type: string
            device:
              type: string

    SignalResponse:
      type: object
      properties:
        signal_id:
          type: string
        intent:
          $ref: '#/components/schemas/Intent'
        execution:
          type: object
          properties:
            plan_id:
              type: string
            status:
              type: string
            steps:
              type: array
              items:
                $ref: '#/components/schemas/ExecutionStep'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'

paths:
  /api/health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: System is healthy

  /api/system:
    get:
      summary: Full system state
      tags: [System]
      responses:
        '200':
          description: System state including metrics and personal model

  /api/signals:
    post:
      summary: Submit a signal
      description: |
        THE core endpoint. Submit any signal (text, file, URL) and Ouro will:
        1. Capture it (Layer 1)
        2. Parse the intent (Layer 2)
        3. Plan and execute tools (Layer 3)
        4. Build artifacts (Layer 4)
        5. Recover patterns (Layer 5)
        6. Trigger evolution (Layer 6)
      tags: [Signals]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalSubmission'
          multipart/form-data:
            schema:
              type: object
              properties:
                text:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Signal processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalResponse'
        '200':
          description: Clarification needed
          content:
            application/json:
              schema:
                type: object
                properties:
                  signal_id:
                    type: string
                  status:
                    type: string
                    example: needs_clarification
                  question:
                    type: string

    get:
      summary: List signals
      tags: [Signals]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: modality
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Signal list

  /api/signals/{id}:
    get:
      summary: Get signal detail
      tags: [Signals]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signal with intents, plans, artifacts, feedback

  /api/signals/{id}/clarify:
    post:
      summary: Answer a clarification question
      tags: [Signals]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer:
                  type: string
      responses:
        '200':
          description: Signal reprocessed with clarification

  /api/signals/{id}/similar:
    get:
      summary: Find semantically similar signals
      tags: [Signals]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Similar signals

  /api/feedback:
    post:
      summary: Submit feedback on an artifact
      tags: [Feedback]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feedback'
      responses:
        '201':
          description: Feedback recorded

  /api/artifacts/{id}:
    get:
      summary: Get artifact detail
      tags: [Artifacts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact detail

  /api/search:
    get:
      summary: Semantic search across signals
      tags: [Search]
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Search results

  /api/graph:
    get:
      summary: Get the idea connection graph
      tags: [Graph]
      parameters:
        - in: query
          name: root
          schema:
            type: string
        - in: query
          name: depth
          schema:
            type: integer
            default: 3
      responses:
        '200':
          description: Graph with nodes and edges

  /api/evolution/stats:
    get:
      summary: Evolution statistics
      tags: [Evolution]
      responses:
        '200':
          description: Current phase, cycle count, patterns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionStats'

  /api/evolution/trigger:
    post:
      summary: Manually trigger an evolution cycle
      tags: [Evolution]
      responses:
        '200':
          description: Evolution events generated

  /api/tools:
    get:
      summary: List registered tools
      tags: [Tools]
      responses:
        '200':
          description: Tool manifests

  /api/tools/register:
    post:
      summary: Register a remote tool
      tags: [Tools]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Registration result

  /api/tools/generate:
    post:
      summary: Auto-generate a tool from capability description
      tags: [Tools]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [capability]
              properties:
                capability:
                  type: string
      responses:
        '200':
          description: Generated tool

  /api/webhook/{source}:
    post:
      summary: Receive signal from external webhook
      tags: [Endpoints]
      parameters:
        - in: path
          name: source
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Signal processed

  /api/telegram/webhook:
    post:
      summary: Telegram bot webhook
      tags: [Endpoints]
      responses:
        '200':
          description: OK

  /api/email/inbound:
    post:
      summary: Receive inbound email as signal
      tags: [Endpoints]
      responses:
        '201':
          description: Email processed

  /api/prompts/{name}:
    get:
      summary: Get active prompt template
      tags: [Prompts]
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active prompt content
    post:
      summary: Create new prompt version
      tags: [Prompts]
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                variables:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: New version created

  /api/admin/stats:
    get:
      summary: Request and database statistics
      tags: [Admin]
      responses:
        '200':
          description: System stats

  /api/admin/logs:
    get:
      summary: Recent request logs
      tags: [Admin]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Request logs
