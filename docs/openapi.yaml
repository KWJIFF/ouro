openapi: 3.0.3
info:
  title: Ouro API
  description: |
    The Self-Evolving Signal System API.
    
    Submit signals, receive artifacts, provide feedback, search, explore evolution.
    The API follows REST conventions with JSON request/response bodies.
    All responses use the format: { success, data?, error?, meta }.
  version: 0.3.0
  contact:
    name: Ouro
    url: https://github.com/KWJIFF/ouro
  license:
    name: MIT

servers:
  - url: http://localhost:3001
    description: Development
  - url: https://api.ouro.dev
    description: Production (future)

paths:
  /api/signals:
    post:
      summary: Submit a signal
      description: |
        THE core endpoint. Submit any signal (text, voice, image, file, sketch).
        The system will parse intent, plan execution, run tools, and return artifacts.
      tags: [Signals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: Signal content
                  example: "Build me a landing page for my coffee shop"
                modality:
                  type: string
                  enum: [text, voice, image, video, sketch, file]
                  default: text
                attachments:
                  type: array
                  items:
                    type: object
                context:
                  type: object
                  description: Ambient context (device, session, etc.)
      responses:
        '200':
          description: Signal processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalResponse'
    get:
      summary: List signals
      tags: [Signals]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated signal list

  /api/signals/{id}:
    get:
      summary: Get signal detail
      tags: [Signals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Signal with intent, plan, artifacts, feedback

  /api/signals/{id}/clarify:
    post:
      summary: Answer clarification question
      tags: [Signals]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                answer: { type: string }

  /api/signals/{id}/similar:
    get:
      summary: Find semantically similar signals
      tags: [Search]

  /api/feedback:
    post:
      summary: Submit feedback on an artifact
      tags: [Feedback]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [artifact_id, signal_id, action]
              properties:
                artifact_id: { type: string }
                signal_id: { type: string }
                action:
                  type: string
                  enum: [accept, modify, reject, fork, share]
                modification: { type: object }
                satisfaction_score: { type: number, minimum: 0, maximum: 1 }

  /api/artifacts/{id}:
    get:
      summary: Get artifact
      tags: [Artifacts]

  /api/artifacts/{id}/versions:
    get:
      summary: Get artifact version history
      tags: [Artifacts]

  /api/search:
    get:
      summary: Semantic search across signals
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }

  /api/graph:
    get:
      summary: Get idea connection graph
      tags: [Graph]

  /api/evolution/stats:
    get:
      summary: Evolution statistics
      tags: [Evolution]

  /api/evolution/trigger:
    post:
      summary: Manually trigger evolution cycle
      tags: [Evolution]

  /api/analytics:
    get:
      summary: Full system analytics
      tags: [Analytics]

  /api/tools:
    get:
      summary: List registered tools
      tags: [Tools]

  /api/tools/register:
    post:
      summary: Register a remote tool
      tags: [Tools]

  /api/tools/generate:
    post:
      summary: AI-generate a new tool
      tags: [Tools]

  /api/health:
    get:
      summary: Basic health check
      tags: [System]

  /api/health/detailed:
    get:
      summary: Detailed health with 6 checks
      tags: [System]

  /api/events/stream:
    get:
      summary: SSE event stream
      tags: [System]

  /api/admin/export:
    get:
      summary: Export data (JSON/CSV/Markdown)
      tags: [Admin]

  /api/admin/replay:
    post:
      summary: Replay signals through current pipeline
      tags: [Admin]

  /api/admin/telemetry:
    get:
      summary: System telemetry
      tags: [Admin]

components:
  schemas:
    SignalResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            signal_id: { type: string }
            intent:
              type: object
              properties:
                type: { type: string, enum: [create, modify, explore, capture, connect, compose] }
                confidence: { type: number }
                description: { type: string }
            plan:
              type: object
              properties:
                steps: { type: array, items: { type: object } }
            artifacts:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  type: { type: string }
                  content: { type: string }
                  metadata: { type: object }
            patterns_extracted: { type: integer }
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ResponseMeta:
      type: object
      properties:
        request_id: { type: string }
        timestamp: { type: string, format: date-time }
        processing_ms: { type: integer }
        api_version: { type: string }

tags:
  - name: Signals
    description: Signal capture and processing
  - name: Feedback
    description: Artifact feedback and satisfaction
  - name: Artifacts
    description: Generated artifacts and versions
  - name: Search
    description: Semantic search and similarity
  - name: Graph
    description: Idea connection graph
  - name: Evolution
    description: Self-evolution system
  - name: Analytics
    description: System metrics and analytics
  - name: Tools
    description: Tool registry and management
  - name: System
    description: Health and events
  - name: Admin
    description: Administrative operations
